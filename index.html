<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidChat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0b0f;
    --bg-mid: #111318;
    --bg-surface: #1a1d26;
    --bg-elevated: #222636;
    --bg-hover: #2a2f42;
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.35);
    --accent2: #f76a9e;
    --accent2-glow: rgba(247,106,158,0.25);
    --green: #3ddc84;
    --red: #f76a6a;
    --yellow: #f7c36a;
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a8;
    --text-muted: #555a70;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(124,106,247,0.4);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    display:flex; align-items:center; justify-content:center;
  }
 
  /* ── NOISE OVERLAY ── */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    opacity:.5;
  }
 
  /* ════════════════ LOGIN SCREEN ════════════════ */
  #loginScreen {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse 80% 80% at 50% 20%, rgba(124,106,247,0.12) 0%, transparent 70%),
                var(--bg-deep);
  }
  .login-box {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 48px 40px;
    width: 420px;
    box-shadow: 0 0 80px rgba(124,106,247,0.1), var(--shadow);
    position:relative; overflow:hidden;
  }
  .login-box::before {
    content:''; position:absolute; top:-60px; right:-60px;
    width:200px; height:200px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events:none;
  }
  .login-logo {
    font-family: 'Space Mono', monospace;
    font-size: 28px; font-weight:700;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-glow);
    letter-spacing: -1px; margin-bottom:6px;
  }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--text-muted); font-size:14px; margin-bottom:36px; }
  .tab-row { display:flex; gap:4px; background:var(--bg-deep); border-radius:10px; padding:4px; margin-bottom:28px; }
  .tab-btn {
    flex:1; padding:9px; border:none; background:transparent;
    color:var(--text-secondary); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
    border-radius:8px; cursor:pointer; transition:.2s;
  }
  .tab-btn.active { background:var(--bg-elevated); color:var(--text-primary); }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; letter-spacing:.5px; text-transform:uppercase; }
  .form-group input {
    width:100%; padding:12px 16px;
    background:var(--bg-deep); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-family:'DM Sans',sans-serif; font-size:15px;
    outline:none; transition:.2s;
  }
  .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .login-btn {
    width:100%; padding:14px; margin-top:8px;
    background: linear-gradient(135deg, var(--accent), #5b4fcf);
    border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
    cursor:pointer; transition:.2s; position:relative; overflow:hidden;
  }
  .login-btn:hover { transform:translateY(-1px); box-shadow:0 6px 24px var(--accent-glow); }
  .login-btn:active { transform:translateY(0); }
  .login-error { color:var(--red); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }
  .avatar-pick { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
  .av-opt {
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    border:2.5px solid transparent; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-deep); transition:.2s;
  }
  .av-opt.selected { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
 
  /* ════════════════ MAIN APP ════════════════ */
  #app { display:none; width:100vw; height:100vh; flex-direction:row; }
  #app.visible { display:flex; }
 
  /* ── SIDEBAR ── */
  #sidebar {
    width:72px; background:var(--bg-deep);
    display:flex; flex-direction:column; align-items:center;
    padding:12px 0; gap:4px; border-right:1px solid var(--border);
    flex-shrink:0;
  }
  .sidebar-logo {
    font-family:'Space Mono',monospace; font-size:18px; font-weight:700;
    color:var(--accent); text-shadow:0 0 20px var(--accent-glow);
    margin-bottom:8px; padding-bottom:8px;
    border-bottom:1px solid var(--border); width:100%; text-align:center;
  }
  .sidebar-icon {
    width:48px; height:48px; border-radius:16px;
    background:var(--bg-surface); color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.2s; font-size:20px; position:relative;
  }
  .sidebar-icon:hover, .sidebar-icon.active {
    background:var(--accent); color:#fff; border-radius:12px;
    box-shadow:0 4px 16px var(--accent-glow);
  }
  .sidebar-icon .badge {
    position:absolute; top:4px; right:4px;
    background:var(--red); color:#fff; font-size:9px; font-weight:700;
    min-width:16px; height:16px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }
  .sidebar-spacer { flex:1; }
  .user-sidebar {
    width:48px; height:48px; border-radius:50%;
    background:var(--bg-elevated); display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; border:2px solid var(--accent);
    box-shadow:0 0 12px var(--accent-glow); position:relative;
  }
  .user-status-dot {
    position:absolute; bottom:1px; right:1px;
    width:12px; height:12px; border-radius:50%; background:var(--green);
    border:2px solid var(--bg-deep);
  }
 
  /* ── CHANNEL/FRIENDS PANEL ── */
  #panel {
    width:240px; background:var(--bg-mid);
    display:flex; flex-direction:column;
    border-right:1px solid var(--border); flex-shrink:0;
  }
  .panel-header {
    padding:16px; font-family:'Space Mono',monospace; font-size:13px;
    font-weight:700; color:var(--text-primary); letter-spacing:1px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-header button {
    background:var(--accent); border:none; color:#fff;
    width:24px; height:24px; border-radius:6px; cursor:pointer;
    font-size:16px; display:flex; align-items:center; justify-content:center;
    transition:.15s;
  }
  .panel-header button:hover { background:#6055d4; }
  .panel-section { padding:8px 8px 4px; }
  .panel-section-label {
    font-size:10px; font-weight:700; color:var(--text-muted);
    letter-spacing:1.5px; text-transform:uppercase; padding:0 8px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .friend-item, .channel-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:var(--radius-sm);
    cursor:pointer; transition:.15s; position:relative;
  }
  .friend-item:hover, .channel-item:hover,
  .friend-item.active, .channel-item.active {
    background:var(--bg-hover); color:var(--text-primary);
  }
  .friend-item.active, .channel-item.active { background:var(--bg-elevated); }
  .fi-avatar {
    width:36px; height:36px; border-radius:50%;
    background:var(--bg-elevated); display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0; position:relative;
  }
  .fi-dot {
    position:absolute; bottom:0; right:0;
    width:11px; height:11px; border-radius:50%;
    border:2px solid var(--bg-mid);
  }
  .fi-dot.online { background:var(--green); }
  .fi-dot.away { background:var(--yellow); }
  .fi-dot.offline { background:var(--text-muted); }
  .fi-name { font-size:14px; font-weight:500; color:var(--text-secondary); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fi-unread { background:var(--accent); color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .panel-footer {
    margin-top:auto; padding:12px;
    background:var(--bg-deep); border-top:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .pf-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .pf-info { flex:1; overflow:hidden; }
  .pf-name { font-size:13px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pf-tag { font-size:11px; color:var(--text-muted); }
  .pf-actions { display:flex; gap:4px; }
  .pf-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; padding:4px; border-radius:6px; transition:.15s; }
  .pf-btn:hover { color:var(--text-primary); background:var(--bg-hover); }
 
  /* ── MAIN CONTENT ── */
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
 
  /* ── FRIENDS VIEW ── */
  #friendsView { flex:1; display:flex; flex-direction:column; }
  .fv-header {
    padding:16px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px;
    background:var(--bg-mid);
  }
  .fv-title { font-family:'Space Mono',monospace; font-size:14px; font-weight:700; }
  .fv-tabs { display:flex; gap:4px; }
  .fv-tab {
    padding:6px 14px; border-radius:8px; border:none;
    background:transparent; color:var(--text-secondary);
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; transition:.15s;
  }
  .fv-tab:hover { background:var(--bg-hover); color:var(--text-primary); }
  .fv-tab.active { background:var(--bg-elevated); color:var(--text-primary); }
  .fv-add-btn {
    background:var(--green); color:#000; border:none; padding:6px 16px;
    border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; transition:.15s; margin-left:auto;
  }
  .fv-add-btn:hover { opacity:.85; }
  .fv-body { flex:1; overflow-y:auto; padding:24px; }
  .add-friend-box {
    background:var(--bg-surface); border-radius:var(--radius); padding:24px;
    border:1px solid var(--border); margin-bottom:24px;
  }
  .add-friend-box h3 { font-family:'Space Mono',monospace; font-size:13px; letter-spacing:1px; margin-bottom:16px; }
  .add-friend-input-row { display:flex; gap:12px; }
  .add-friend-input-row input {
    flex:1; padding:12px 16px; background:var(--bg-deep); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
  }
  .add-friend-input-row input:focus { border-color:var(--accent); }
  .add-friend-input-row button {
    padding:12px 20px; background:var(--accent); border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
    cursor:pointer; transition:.15s;
  }
  .add-friend-input-row button:hover { background:#6055d4; }
  .friend-card {
    display:flex; align-items:center; gap:16px;
    padding:14px 16px; background:var(--bg-surface); border-radius:var(--radius);
    border:1px solid var(--border); margin-bottom:8px; transition:.15s;
  }
  .friend-card:hover { border-color:var(--border-accent); background:var(--bg-elevated); }
  .fc-avatar { width:44px; height:44px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .fc-info { flex:1; }
  .fc-name { font-size:15px; font-weight:600; }
  .fc-status { font-size:12px; color:var(--text-muted); }
  .fc-actions { display:flex; gap:8px; }
  .fc-btn {
    padding:8px 16px; border-radius:8px; border:none;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; transition:.15s;
  }
  .fc-btn.msg { background:var(--bg-hover); color:var(--text-primary); }
  .fc-btn.msg:hover { background:var(--accent); color:#fff; }
  .fc-btn.call { background:var(--green); color:#000; }
  .fc-btn.call:hover { opacity:.85; }
  .fc-btn.remove { background:var(--bg-hover); color:var(--red); }
  .fc-btn.remove:hover { background:var(--red); color:#fff; }
  .fc-btn.accept { background:var(--green); color:#000; }
  .fc-btn.decline { background:var(--bg-hover); color:var(--red); }
 
  /* ── CHAT VIEW ── */
  #chatView { flex:1; display:none; flex-direction:column; }
  #chatView.visible { display:flex; }
  .chat-header {
    padding:14px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:14px;
    background:var(--bg-mid); flex-shrink:0;
  }
  .ch-avatar { width:38px; height:38px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .ch-name { font-size:15px; font-weight:600; }
  .ch-status { font-size:12px; color:var(--text-muted); }
  .ch-actions { margin-left:auto; display:flex; gap:8px; }
  .ch-btn {
    width:36px; height:36px; border-radius:10px; border:none;
    background:var(--bg-elevated); color:var(--text-secondary);
    font-size:16px; cursor:pointer; transition:.15s;
    display:flex; align-items:center; justify-content:center;
  }
  .ch-btn:hover { background:var(--accent); color:#fff; }
  .ch-btn.active { background:var(--green); color:#000; }
  .ch-btn.danger { background:var(--red); color:#fff; }
  .messages {
    flex:1; overflow-y:auto; padding:16px 24px;
    display:flex; flex-direction:column; gap:2px;
  }
  .messages::-webkit-scrollbar { width:6px; }
  .messages::-webkit-scrollbar-track { background:transparent; }
  .messages::-webkit-scrollbar-thumb { background:var(--bg-elevated); border-radius:3px; }
  .msg-group { margin-bottom:12px; }
  .msg-header { display:flex; align-items:baseline; gap:10px; margin-bottom:3px; }
  .msg-author { font-size:14px; font-weight:600; color:var(--text-primary); }
  .msg-time { font-size:11px; color:var(--text-muted); }
  .msg-bubble { font-size:14px; color:var(--text-secondary); line-height:1.5; padding:8px 12px; background:var(--bg-surface); border-radius:0 10px 10px 10px; display:inline-block; max-width:100%; word-break:break-word; }
  .msg-bubble.mine { background:linear-gradient(135deg, var(--accent), #5b4fcf); color:#fff; border-radius:10px 0 10px 10px; }
  .msg-group.mine { display:flex; flex-direction:column; align-items:flex-end; }
  .msg-group.mine .msg-header { flex-direction:row-reverse; }
  .msg-group.mine .msg-author { color:var(--accent); }
  .chat-input-area {
    padding:12px 24px 16px; flex-shrink:0;
    background:var(--bg-mid); border-top:1px solid var(--border);
  }
  .chat-input-row {
    display:flex; align-items:center; gap:10px;
    background:var(--bg-surface); border-radius:var(--radius); padding:6px 8px 6px 16px;
    border:1.5px solid var(--border); transition:.2s;
  }
  .chat-input-row:focus-within { border-color:var(--accent); }
  .chat-input-row input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text-primary); font-family:'DM Sans',sans-serif; font-size:14px;
    padding:6px 0;
  }
  .chat-input-row input::placeholder { color:var(--text-muted); }
  .send-btn {
    width:36px; height:36px; border-radius:10px; border:none;
    background:var(--accent); color:#fff; font-size:16px;
    cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center;
  }
  .send-btn:hover { background:#6055d4; transform:scale(1.05); }
 
  /* ── VIDEO CALL ── */
  #callOverlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.85); backdrop-filter:blur(10px);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:20px;
  }
  #callOverlay.visible { display:flex; }
  .call-header { color:var(--text-primary); font-family:'Space Mono',monospace; font-size:14px; letter-spacing:1px; }
  .call-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    max-width:1000px; width:90vw;
  }
  .call-grid.solo { grid-template-columns:1fr; max-width:680px; }
  .video-tile {
    background:var(--bg-surface); border-radius:16px; overflow:hidden;
    aspect-ratio:16/9; position:relative; border:1px solid var(--border);
  }
  .video-tile video { width:100%; height:100%; object-fit:cover; }
  .video-tile .tile-label {
    position:absolute; bottom:12px; left:12px;
    background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px;
    font-size:12px; font-weight:600; backdrop-filter:blur(4px);
  }
  .video-tile .tile-muted {
    position:absolute; top:12px; right:12px;
    background:var(--red); width:28px; height:28px; border-radius:50%;
    display:none; align-items:center; justify-content:center; font-size:12px;
  }
  .call-controls {
    display:flex; gap:12px; align-items:center;
  }
  .ctrl-btn {
    width:52px; height:52px; border-radius:50%; border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; transition:.2s;
  }
  .ctrl-btn.toggle { background:var(--bg-elevated); color:var(--text-primary); }
  .ctrl-btn.toggle:hover { background:var(--bg-hover); }
  .ctrl-btn.toggle.off { background:rgba(247,106,106,0.2); color:var(--red); }
  .ctrl-btn.end { background:var(--red); color:#fff; width:60px; height:60px; font-size:22px; }
  .ctrl-btn.end:hover { background:#d94f4f; transform:scale(1.05); }
  .ctrl-btn.screen { background:var(--bg-elevated); color:var(--text-secondary); }
  .ctrl-btn.screen.active { background:var(--green); color:#000; }
 
  /* ── ADD FRIEND MODAL ── */
  #addModal {
    position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center;
  }
  #addModal.visible { display:flex; }
  .modal-box {
    background:var(--bg-surface); border:1px solid var(--border); border-radius:20px;
    padding:32px; width:440px; box-shadow:var(--shadow);
  }
  .modal-box h2 { font-family:'Space Mono',monospace; font-size:16px; margin-bottom:8px; }
  .modal-box p { color:var(--text-muted); font-size:13px; margin-bottom:24px; }
  .modal-input {
    width:100%; padding:12px 16px; background:var(--bg-deep); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-family:'DM Sans',sans-serif; font-size:14px; outline:none; margin-bottom:16px;
  }
  .modal-input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .modal-btn {
    padding:10px 22px; border-radius:var(--radius-sm); border:none;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:.15s;
  }
  .modal-btn.cancel { background:var(--bg-hover); color:var(--text-secondary); }
  .modal-btn.confirm { background:var(--accent); color:#fff; }
  .modal-btn.confirm:hover { background:#6055d4; }
  .modal-msg { font-size:13px; min-height:18px; color:var(--green); }
  .modal-msg.error { color:var(--red); }
 
  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:9998;
    background:var(--bg-elevated); border:1px solid var(--border);
    border-radius:12px; padding:14px 20px;
    color:var(--text-primary); font-size:14px;
    box-shadow:var(--shadow); animation:slideIn .3s ease;
    max-width:320px;
  }
  @keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
 
  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--bg-elevated); border-radius:2px; }
 
  /* ── EMPTY STATE ── */
  .empty-state {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:var(--text-muted);
  }
  .empty-state .es-icon { font-size:64px; opacity:.3; }
  .empty-state p { font-size:16px; font-family:'Space Mono',monospace; }
  .empty-state small { font-size:13px; }
 
  /* ── INCOMING CALL ── */
  #incomingCall {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:400; background:var(--bg-elevated); border:1px solid var(--border);
    border-radius:16px; padding:20px 28px; display:none; align-items:center; gap:20px;
    box-shadow:var(--shadow); animation:slideIn .3s ease;
  }
  #incomingCall.visible { display:flex; }
  .ic-info { display:flex; flex-direction:column; gap:4px; }
  .ic-from { font-size:13px; color:var(--text-muted); }
  .ic-name { font-size:16px; font-weight:700; }
  .ic-btns { display:flex; gap:10px; }
  .ic-accept { padding:10px 20px; background:var(--green); color:#000; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .ic-decline { padding:10px 20px; background:var(--red); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
 
  /* ── PENDING COUNT BADGE ── */
  .pend-badge {
    background:var(--red); color:#fff; font-size:10px; font-weight:700;
    min-width:16px; height:16px; border-radius:8px;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 4px; margin-left:6px;
  }
 
  /* Notification dot on friends sidebar icon */
  #notifDot { display:none; }
</style>
</head>
<body>
 
<!-- ════════════════ LOGIN ════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">void<span>chat</span></div>
    <div class="login-sub">your space to connect, call &amp; create.</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
    </div>
    <!-- Login -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="loginErr"></div>
    </div>
    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="At least 4 characters" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label>Pick an Avatar</label>
        <div class="avatar-pick" id="avatarPick"></div>
      </div>
      <button class="login-btn" onclick="doRegister()">Create Account</button>
      <div class="login-error" id="regErr"></div>
    </div>
  </div>
</div>
 
<!-- ════════════════ APP ════════════════ -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">V</div>
    <div class="sidebar-icon active" id="navFriends" onclick="showSection('friends')" title="Friends">👥<span class="badge" id="notifDot" style="display:none">!</span></div>
    <div class="sidebar-spacer"></div>
    <div class="user-sidebar" id="sidebarAvatar" onclick="showToast('Settings coming soon!')">🙂<div class="user-status-dot"></div></div>
  </div>
 
  <!-- Panel -->
  <div id="panel">
    <div class="panel-header">
      <span>Direct Messages</span>
      <button onclick="openAddFriendModal()" title="Add Friend">+</button>
    </div>
    <div style="flex:1; overflow-y:auto; padding:8px 0;">
      <div class="panel-section">
        <div class="panel-section-label">FRIENDS</div>
      </div>
      <div id="dmList"></div>
    </div>
    <div class="panel-footer">
      <div class="pf-avatar" id="pfAvatar">🙂</div>
      <div class="pf-info">
        <div class="pf-name" id="pfName">Loading...</div>
        <div class="pf-tag" id="pfTag">#0000</div>
      </div>
      <div class="pf-actions">
        <button class="pf-btn" onclick="doLogout()" title="Logout">🚪</button>
      </div>
    </div>
  </div>
 
  <!-- Main -->
  <div id="main">
    <!-- Friends View -->
    <div id="friendsView">
      <div class="fv-header">
        <span style="font-size:20px">👥</span>
        <span class="fv-title">FRIENDS</span>
        <div class="fv-tabs">
          <button class="fv-tab active" onclick="switchFriendsTab('online')">Online</button>
          <button class="fv-tab" onclick="switchFriendsTab('all')">All</button>
          <button class="fv-tab" onclick="switchFriendsTab('pending')">Pending<span class="pend-badge" id="pendBadge" style="display:none">0</span></button>
        </div>
        <button class="fv-add-btn" onclick="openAddFriendModal()">+ Add Friend</button>
      </div>
      <div class="fv-body" id="friendsBody">
        <div class="empty-state"><div class="es-icon">👻</div><p>No friends yet</p><small>Add someone to get started</small></div>
      </div>
    </div>
 
    <!-- Chat View -->
    <div id="chatView">
      <div class="chat-header">
        <div class="ch-avatar" id="chatAvatar">🙂</div>
        <div>
          <div class="ch-name" id="chatName">User</div>
          <div class="ch-status" id="chatStatus">Online</div>
        </div>
        <div class="ch-actions">
          <button class="ch-btn" id="callBtn" onclick="startCall(false)" title="Voice Call">📞</button>
          <button class="ch-btn" id="videoBtn" onclick="startCall(true)" title="Video Call">📹</button>
        </div>
      </div>
      <div class="messages" id="messagesContainer"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()"/>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>
 
<!-- ════════════════ CALL OVERLAY ════════════════ -->
<div id="callOverlay">
  <div class="call-header" id="callTitle">Call with ...</div>
  <div class="call-grid" id="callGrid">
    <div class="video-tile" id="myTile">
      <video id="myVideo" autoplay muted playsinline></video>
      <div class="tile-label" id="myLabel">You</div>
      <div class="tile-muted" id="myMutedIcon">🔇</div>
    </div>
    <div class="video-tile" id="remoteTile">
      <video id="remoteVideo" autoplay playsinline style="display:none"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;" id="remoteWait">
        <div style="font-size:48px" id="remoteAvatar">🙂</div>
        <div style="font-size:13px;color:var(--text-muted)">Connecting...</div>
      </div>
      <div class="tile-label" id="remoteLabel">Remote</div>
    </div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn toggle" id="muteBtn" onclick="toggleMic()" title="Toggle Mic">🎤</button>
    <button class="ctrl-btn toggle" id="camBtn" onclick="toggleCam()" title="Toggle Camera">📹</button>
    <button class="ctrl-btn screen" id="screenBtn" onclick="toggleScreenShare()" title="Share Screen">🖥️</button>
    <button class="ctrl-btn end" onclick="endCall()" title="End Call">📵</button>
  </div>
</div>
 
<!-- ════════════════ INCOMING CALL ════════════════ -->
<div id="incomingCall">
  <div style="font-size:32px" id="icAvatar">🙂</div>
  <div class="ic-info">
    <div class="ic-from">Incoming Call</div>
    <div class="ic-name" id="icName">User</div>
  </div>
  <div class="ic-btns">
    <button class="ic-accept" onclick="acceptCall()">✓ Accept</button>
    <button class="ic-decline" onclick="declineCall()">✕ Decline</button>
  </div>
</div>
 
<!-- ════════════════ ADD FRIEND MODAL ════════════════ -->
<div id="addModal">
  <div class="modal-box">
    <h2>Add a Friend</h2>
    <p>Enter their exact username to send a friend request.</p>
    <input class="modal-input" type="text" id="addFriendInput" placeholder="Enter username..."/>
    <div class="modal-msg" id="addFriendMsg"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeAddFriendModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="sendFriendRequest()">Send Request</button>
    </div>
  </div>
</div>
 
<script>
// ═══════════════════════════════════════════════
//   DATA STORE  (localStorage)
// ═══════════════════════════════════════════════
const EMOJIS = ['🐺','🦊','🐸','🐼','🦋','🐙','🦄','🐲','🌙','⚡','🌊','🎭'];
 
function getDB(){ return JSON.parse(localStorage.getItem('voidchat_db')||'{"users":{},"messages":{}}'); }
function saveDB(db){ localStorage.setItem('voidchat_db', JSON.stringify(db)); }
function genTag(){ return String(Math.floor(1000+Math.random()*9000)); }
 
let currentUser = null;
let currentChatWith = null;
let currentFriendsTab = 'online';
 
// Media
let localStream = null;
let screenStream = null;
let isMuted = false;
let isCamOff = false;
let isScreenSharing = false;
let callVideoMode = false;
let simulatedCallActive = false;
 
// ═══════════════════════════════════════════════
//   AUTH
// ═══════════════════════════════════════════════
function switchAuthTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',
    (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').style.display = tab==='login'?'':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'':'none';
}
 
// Populate avatar picker
(function(){
  const pick = document.getElementById('avatarPick');
  EMOJIS.forEach((e,i)=>{
    const d = document.createElement('div');
    d.className='av-opt'+(i===0?' selected':'');
    d.textContent=e; d.dataset.emoji=e;
    d.onclick=()=>{
      document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
    };
    pick.appendChild(d);
  });
})();
 
function getSelectedAvatar(){
  const sel = document.querySelector('.av-opt.selected');
  return sel ? sel.dataset.emoji : '🐺';
}
 
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if(!u||!p){ err.textContent='Please fill all fields.'; return; }
  const db = getDB();
  if(!db.users[u]){ err.textContent='User not found.'; return; }
  if(db.users[u].password !== p){ err.textContent='Wrong password.'; return; }
  err.textContent='';
  db.users[u].status='online';
  saveDB(db);
  bootApp(u);
}
 
function doRegister(){
  const u = document.getElementById('regUser').value.trim();
  const p = document.getElementById('regPass').value;
  const err = document.getElementById('regErr');
  if(!u||!p){ err.textContent='Please fill all fields.'; return; }
  if(u.length<2){ err.textContent='Username must be at least 2 chars.'; return; }
  if(p.length<4){ err.textContent='Password must be at least 4 chars.'; return; }
  const db = getDB();
  if(db.users[u]){ err.textContent='Username already taken.'; return; }
  const avatar = getSelectedAvatar();
  db.users[u] = { password:p, avatar, tag:genTag(), status:'online', friends:[], pendingIn:[], pendingOut:[] };
  saveDB(db);
  bootApp(u);
}
 
function doLogout(){
  const db = getDB();
  if(db.users[currentUser]) db.users[currentUser].status='offline';
  saveDB(db);
  currentUser = null; currentChatWith = null;
  endCall();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display='flex';
}
 
function bootApp(username){
  currentUser = username;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('visible');
  renderSelf();
  renderDMList();
  renderFriends();
  showSection('friends');
}
 
// ═══════════════════════════════════════════════
//   RENDER SELF
// ═══════════════════════════════════════════════
function renderSelf(){
  const db = getDB();
  const me = db.users[currentUser];
  document.getElementById('pfName').textContent = currentUser;
  document.getElementById('pfTag').textContent = '#'+me.tag;
  document.getElementById('pfAvatar').textContent = me.avatar;
  document.getElementById('sidebarAvatar').childNodes[0].textContent = me.avatar;
  document.getElementById('myLabel').textContent = currentUser+' (You)';
}
 
// ═══════════════════════════════════════════════
//   SECTION NAVIGATION
// ═══════════════════════════════════════════════
function showSection(sec){
  document.getElementById('friendsView').style.display = sec==='friends'?'flex':'none';
  document.getElementById('chatView').classList.toggle('visible', sec==='chat');
  document.getElementById('navFriends').classList.toggle('active', sec==='friends');
}
 
// ═══════════════════════════════════════════════
//   FRIEND SYSTEM
// ═══════════════════════════════════════════════
function openAddFriendModal(){
  document.getElementById('addModal').classList.add('visible');
  document.getElementById('addFriendInput').value='';
  document.getElementById('addFriendMsg').textContent='';
  document.getElementById('addFriendMsg').className='modal-msg';
  setTimeout(()=>document.getElementById('addFriendInput').focus(),50);
}
function closeAddFriendModal(){ document.getElementById('addModal').classList.remove('visible'); }
document.getElementById('addModal').addEventListener('click',e=>{ if(e.target===document.getElementById('addModal')) closeAddFriendModal(); });
 
function sendFriendRequest(){
  const target = document.getElementById('addFriendInput').value.trim();
  const msg = document.getElementById('addFriendMsg');
  if(!target){ msg.textContent='Enter a username.'; msg.className='modal-msg error'; return; }
  if(target===currentUser){ msg.textContent="You can't add yourself!"; msg.className='modal-msg error'; return; }
  const db = getDB();
  if(!db.users[target]){ msg.textContent='User not found.'; msg.className='modal-msg error'; return; }
  const me = db.users[currentUser];
  const them = db.users[target];
  if(me.friends.includes(target)){ msg.textContent='Already friends!'; msg.className='modal-msg error'; return; }
  if(me.pendingOut.includes(target)){ msg.textContent='Request already sent.'; msg.className='modal-msg error'; return; }
  if(me.pendingIn.includes(target)){
    // Auto-accept
    me.friends.push(target); them.friends.push(currentUser);
    me.pendingIn = me.pendingIn.filter(x=>x!==target);
    them.pendingOut = (them.pendingOut||[]).filter(x=>x!==currentUser);
    saveDB(db); renderDMList(); renderFriends();
    msg.textContent = `You and ${target} are now friends! 🎉`; msg.className='modal-msg';
    setTimeout(closeAddFriendModal,1500); return;
  }
  me.pendingOut = me.pendingOut||[];
  them.pendingIn = them.pendingIn||[];
  me.pendingOut.push(target);
  them.pendingIn.push(currentUser);
  saveDB(db); renderFriends();
  msg.textContent = `Friend request sent to ${target}!`; msg.className='modal-msg';
  setTimeout(closeAddFriendModal,1500);
}
 
function acceptFriend(username){
  const db = getDB();
  const me = db.users[currentUser];
  const them = db.users[username];
  me.friends = me.friends||[];
  them.friends = them.friends||[];
  me.friends.push(username);
  them.friends.push(currentUser);
  me.pendingIn = (me.pendingIn||[]).filter(x=>x!==username);
  them.pendingOut = (them.pendingOut||[]).filter(x=>x!==currentUser);
  saveDB(db); renderDMList(); renderFriends();
  showToast(`You and ${username} are now friends! 🎉`);
}
 
function declineFriend(username){
  const db = getDB();
  const me = db.users[currentUser];
  const them = db.users[username];
  me.pendingIn = (me.pendingIn||[]).filter(x=>x!==username);
  them.pendingOut = (them.pendingOut||[]).filter(x=>x!==currentUser);
  saveDB(db); renderFriends();
}
 
function removeFriend(username){
  const db = getDB();
  const me = db.users[currentUser];
  const them = db.users[username];
  me.friends = (me.friends||[]).filter(x=>x!==username);
  them.friends = (them.friends||[]).filter(x=>x!==currentUser);
  saveDB(db); renderDMList(); renderFriends();
  if(currentChatWith===username){ showSection('friends'); currentChatWith=null; }
}
 
function switchFriendsTab(tab){
  currentFriendsTab=tab;
  document.querySelectorAll('.fv-tab').forEach((b,i)=>{
    b.classList.toggle('active',
      (tab==='online'&&i===0)||(tab==='all'&&i===1)||(tab==='pending'&&i===2));
  });
  renderFriends();
}
 
function renderFriends(){
  const db = getDB();
  const me = db.users[currentUser];
  const friends = me.friends||[];
  const pending = me.pendingIn||[];
  const body = document.getElementById('friendsBody');
 
  // Update badge
  const pb = document.getElementById('pendBadge');
  if(pending.length>0){ pb.style.display='inline-flex'; pb.textContent=pending.length; }
  else pb.style.display='none';
 
  // Notif dot on sidebar
  const nd = document.getElementById('notifDot');
  nd.style.display = pending.length>0 ? '' : 'none';
 
  let items = [];
  if(currentFriendsTab==='pending'){
    items = pending.map(u=>({u, type:'pending'}));
    const out = (me.pendingOut||[]);
    out.forEach(u=>items.push({u,type:'outgoing'}));
  } else {
    items = friends.filter(u=>{
      if(!db.users[u]) return false;
      if(currentFriendsTab==='online') return db.users[u].status==='online';
      return true;
    }).map(u=>({u,type:'friend'}));
  }
 
  if(items.length===0){
    body.innerHTML=`<div class="empty-state"><div class="es-icon">${currentFriendsTab==='pending'?'📬':'👻'}</div>
      <p>${currentFriendsTab==='pending'?'No pending requests':'No friends here'}</p>
      <small>${currentFriendsTab==='pending'?'When someone sends you a request, it appears here':'Add friends to start chatting!'}</small></div>`;
    return;
  }
 
  body.innerHTML = items.map(({u,type})=>{
    const usr = db.users[u]||{avatar:'👤',tag:'????',status:'offline'};
    const dot = usr.status==='online'?'🟢 Online':'⚫ Offline';
    if(type==='pending'){
      return `<div class="friend-card">
        <div class="fc-avatar">${usr.avatar}</div>
        <div class="fc-info"><div class="fc-name">${u}</div><div class="fc-status">📩 Incoming Request</div></div>
        <div class="fc-actions">
          <button class="fc-btn accept" onclick="acceptFriend('${u}')">✓ Accept</button>
          <button class="fc-btn decline" onclick="declineFriend('${u}')">✕</button>
        </div>
      </div>`;
    }
    if(type==='outgoing'){
      return `<div class="friend-card">
        <div class="fc-avatar">${usr.avatar}</div>
        <div class="fc-info"><div class="fc-name">${u}</div><div class="fc-status">📤 Request Sent</div></div>
        <div class="fc-actions"><span style="font-size:12px;color:var(--text-muted)">Pending...</span></div>
      </div>`;
    }
    return `<div class="friend-card">
      <div class="fc-avatar">${usr.avatar}</div>
      <div class="fc-info"><div class="fc-name">${u} <span style="color:var(--text-muted);font-size:12px">#${usr.tag}</span></div><div class="fc-status">${dot}</div></div>
      <div class="fc-actions">
        <button class="fc-btn msg" onclick="openChat('${u}')">💬 Message</button>
        <button class="fc-btn call" onclick="openChat('${u}');setTimeout(()=>startCall(true),200)">📹 Call</button>
        <button class="fc-btn remove" onclick="removeFriend('${u}')">✕</button>
      </div>
    </div>`;
  }).join('');
}
 
// ═══════════════════════════════════════════════
//   DM LIST
// ═══════════════════════════════════════════════
function renderDMList(){
  const db = getDB();
  const me = db.users[currentUser];
  const friends = me.friends||[];
  const list = document.getElementById('dmList');
  if(!friends.length){ list.innerHTML='<div style="padding:12px 18px;font-size:12px;color:var(--text-muted)">No friends yet</div>'; return; }
  list.innerHTML = friends.map(u=>{
    const usr = db.users[u];
    if(!usr) return '';
    const dotClass = usr.status==='online'?'online':'offline';
    const key = chatKey(currentUser,u);
    const msgs = (db.messages[key]||[]);
    const unread = msgs.filter(m=>m.to===currentUser&&!m.read).length;
    const last = msgs[msgs.length-1];
    const preview = last ? (last.from===currentUser?'You: ':'')+last.text.slice(0,22)+(last.text.length>22?'...':'') : '';
    return `<div class="friend-item${currentChatWith===u?' active':''}" onclick="openChat('${u}')">
      <div class="fi-avatar">${usr.avatar}<div class="fi-dot ${dotClass}"></div></div>
      <div style="flex:1;min-width:0">
        <div class="fi-name">${u}</div>
        ${preview?`<div style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${preview}</div>`:''}
      </div>
      ${unread>0?`<div class="fi-unread">${unread}</div>`:''}
    </div>`;
  }).join('');
}
 
function chatKey(a,b){ return [a,b].sort().join('::'); }
 
// ═══════════════════════════════════════════════
//   CHAT
// ═══════════════════════════════════════════════
function openChat(username){
  const db = getDB();
  const usr = db.users[username];
  if(!usr) return;
  currentChatWith = username;
 
  // Mark messages as read
  const key = chatKey(currentUser, username);
  if(db.messages[key]){
    db.messages[key].forEach(m=>{ if(m.to===currentUser) m.read=true; });
    saveDB(db);
  }
 
  document.getElementById('chatAvatar').textContent = usr.avatar;
  document.getElementById('chatName').textContent = username;
  document.getElementById('chatStatus').textContent = usr.status==='online'?'🟢 Online':'⚫ Offline';
  renderMessages();
  showSection('chat');
  renderDMList();
}
 
function renderMessages(){
  if(!currentChatWith) return;
  const db = getDB();
  const key = chatKey(currentUser, currentChatWith);
  const msgs = db.messages[key]||[];
  const container = document.getElementById('messagesContainer');
 
  if(!msgs.length){
    container.innerHTML=`<div class="empty-state"><div class="es-icon">💬</div><p>No messages yet</p><small>Say hello!</small></div>`;
    return;
  }
 
  // Group consecutive messages from same sender
  const groups = [];
  msgs.forEach(m=>{
    const last = groups[groups.length-1];
    if(last&&last.from===m.from) last.texts.push(m.text);
    else groups.push({from:m.from, texts:[m.text], time:m.time});
  });
 
  const db2 = getDB();
  container.innerHTML = groups.map(g=>{
    const mine = g.from===currentUser;
    const usr = db2.users[g.from]||{avatar:'👤'};
    return `<div class="msg-group${mine?' mine':''}">
      <div class="msg-header">
        <span style="font-size:18px">${usr.avatar}</span>
        <span class="msg-author">${g.from}</span>
        <span class="msg-time">${g.time}</span>
      </div>
      ${g.texts.map(t=>`<div class="msg-bubble${mine?' mine':''}">${escapeHtml(t)}</div>`).join('')}
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}
 
function sendMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text||!currentChatWith) return;
  const db = getDB();
  const key = chatKey(currentUser, currentChatWith);
  if(!db.messages[key]) db.messages[key]=[];
  const now = new Date();
  const time = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  db.messages[key].push({ from:currentUser, to:currentChatWith, text, time, read:false });
  saveDB(db);
  input.value='';
  renderMessages();
  renderDMList();
}
 
function escapeHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
// ═══════════════════════════════════════════════
//   REAL MEDIA CALLS (WebRTC local simulation)
// ═══════════════════════════════════════════════
async function startCall(withVideo){
  callVideoMode = withVideo;
  const db = getDB();
  const them = db.users[currentChatWith||''];
  document.getElementById('callTitle').textContent = `${withVideo?'📹':'📞'} Call with ${currentChatWith||''}`;
  document.getElementById('remoteLabel').textContent = currentChatWith||'Remote';
  document.getElementById('remoteAvatar').textContent = them ? them.avatar : '👤';
 
  // Request real media from browser
  try {
    const constraints = { audio:true, video: withVideo };
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('myVideo').srcObject = localStream;
    isMuted = false; isCamOff = false;
    updateMediaButtons();
  } catch(e){
    showToast('⚠️ Could not access camera/mic: ' + e.message);
    // Still show call UI with no video
    localStream = null;
  }
 
  document.getElementById('callOverlay').classList.add('visible');
  document.getElementById('callGrid').className = 'call-grid';
  simulatedCallActive = true;
 
  // Simulate remote stream (echo local with delay) for demo
  setTimeout(()=>{
    if(!simulatedCallActive) return;
    if(localStream && withVideo){
      // Show a mirrored version as "remote" (demo only, real app would use WebRTC peer connection)
      document.getElementById('remoteVideo').srcObject = localStream;
      document.getElementById('remoteVideo').style.display='';
      document.getElementById('remoteWait').style.display='none';
    }
  }, 2000);
}
 
function endCall(){
  simulatedCallActive = false;
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
  document.getElementById('myVideo').srcObject=null;
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('remoteVideo').style.display='none';
  document.getElementById('remoteWait').style.display='flex';
  document.getElementById('callOverlay').classList.remove('visible');
  isScreenSharing=false; isMuted=false; isCamOff=false;
  updateMediaButtons();
}
 
function toggleMic(){
  if(!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  updateMediaButtons();
}
 
function toggleCam(){
  if(!localStream) return;
  isCamOff = !isCamOff;
  localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff);
  updateMediaButtons();
}
 
async function toggleScreenShare(){
  const btn = document.getElementById('screenBtn');
  if(isScreenSharing){
    if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
    isScreenSharing=false;
    // Restore camera
    if(localStream){
      document.getElementById('myVideo').srcObject=localStream;
    }
    btn.className='ctrl-btn screen';
    btn.title='Share Screen';
    showToast('Screen sharing stopped.');
  } else {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
      document.getElementById('myVideo').srcObject=screenStream;
      isScreenSharing=true;
      btn.className='ctrl-btn screen active';
      btn.title='Stop Sharing';
      showToast('🖥️ Screen sharing started!');
      screenStream.getVideoTracks()[0].onended = ()=>toggleScreenShare();
    } catch(e){
      showToast('Screen sharing cancelled or denied.');
    }
  }
}
 
function updateMediaButtons(){
  const mb = document.getElementById('muteBtn');
  mb.className = 'ctrl-btn toggle'+(isMuted?' off':'');
  mb.textContent = isMuted ? '🔇' : '🎤';
  const cb = document.getElementById('camBtn');
  cb.className = 'ctrl-btn toggle'+(isCamOff?' off':'');
  cb.textContent = isCamOff ? '📵' : '📹';
  document.getElementById('myMutedIcon').style.display = isMuted ? 'flex' : 'none';
}
 
// Simulated incoming call (for demo: press 'I' key)
function acceptCall(){ document.getElementById('incomingCall').classList.remove('visible'); startCall(true); }
function declineCall(){ document.getElementById('incomingCall').classList.remove('visible'); showToast('Call declined.'); }
document.addEventListener('keydown',e=>{
  if(e.key==='i'&&document.getElementById('callOverlay').classList.contains('visible')===false&&currentChatWith){
    const db=getDB(); const them=db.users[currentChatWith]||{};
    document.getElementById('icName').textContent=currentChatWith;
    document.getElementById('icAvatar').textContent=them.avatar||'👤';
    document.getElementById('incomingCall').classList.add('visible');
    setTimeout(()=>document.getElementById('incomingCall').classList.remove('visible'),15000);
  }
  if(e.key==='Escape'){ document.getElementById('incomingCall').classList.remove('visible'); closeAddFriendModal(); }
});
 
// ═══════════════════════════════════════════════
//   TOAST
// ═══════════════════════════════════════════════
function showToast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
 
// ═══════════════════════════════════════════════
//   AUTO REFRESH (poll every 2s for new messages)
// ═══════════════════════════════════════════════
setInterval(()=>{
  if(!currentUser) return;
  renderDMList();
  renderFriends();
  if(currentChatWith) renderMessages();
}, 2000);
