<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Discord Clone</title>
    <!-- React and Babel CDNs for instant running -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #36393f; color: white; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 72px; background-color: #202225; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; }
        .server-icon { width: 48px; height: 48px; border-radius: 50%; background-color: #36393f; color: #dcddde; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .server-icon:hover, .server-icon.active { border-radius: 16px; background-color: #5865f2; color: white; }
        .add-server { background-color: #3ba55d !important; color: white !important; }

        /* Chat Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid #26272d; font-weight: bold; font-size: 16px; }
        .chat-area { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; }
        .message .user { font-weight: bold; color: #fff; font-size: 14px; }
        .message .text { color: #dcddde; font-size: 15px; }
        
        /* Input Area */
        .input-container { padding: 16px; }
        .message-input { width: 100%; padding: 12px; border-radius: 8px; border: none; background-color: #40444b; color: white; outline: none; }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; background: #36393f; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .auth-card { background: #2f3136; padding: 32px; border-radius: 8px; width: 400px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .auth-input { width: 100%; padding: 10px; margin: 12px 0; border-radius: 3px; border: none; background: #202225; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #5865f2; border: none; color: white; border-radius: 3px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [currentServer, setCurrentServer] = useState('General');
            const [msgInput, setMsgInput] = useState('');
            const [authMode, setAuthMode] = useState('login');
            const [tempUser, setTempUser] = useState('');

            // App State: List of servers and their message history
            const [data, setData] = useState({
                servers: ['General', 'Gaming', 'Dev'],
                chatHistory: {
                    'General': [{ user: 'System', text: 'Welcome to the general chat!' }],
                    'Gaming': [{ user: 'System', text: 'Talk about games here.' }],
                    'Dev': [{ user: 'System', text: 'Show us your code.' }]
                }
            });

            const handleLogin = (e) => {
                e.preventDefault();
                if (tempUser.trim()) setUser(tempUser);
            };

            const sendMessage = (e) => {
                if (e.key === 'Enter' && msgInput.trim()) {
                    const newMsg = { user: user, text: msgInput };
                    setData(prev => ({
                        ...prev,
                        chatHistory: {
                            ...prev.chatHistory,
                            [currentServer]: [...prev.chatHistory[currentServer], newMsg]
                        }
                    }));
                    setMsgInput('');
                }
            };

            const addNewServer = () => {
                const sName = prompt("Enter new server name:");
                if (sName && !data.servers.includes(sName)) {
                    setData(prev => ({
                        servers: [...prev.servers, sName],
                        chatHistory: { ...prev.chatHistory, [sName]: [] }
                    }));
                }
            };

            // 1. Auth Page
            if (!user) {
                return (
                    <div className="auth-overlay">
                        <div className="auth-card">
                            <h2 style={{textAlign: 'center'}}>{authMode === 'login' ? 'Welcome back!' : 'Create an account'}</h2>
                            <form onSubmit={handleLogin}>
                                <label style={{fontSize: '12px', color: '#b9bbbe', textTransform: 'uppercase'}}>Username</label>
                                <input className="auth-input" value={tempUser} onChange={(e) => setTempUser(e.target.value)} required />
                                <label style={{fontSize: '12px', color: '#b9bbbe', textTransform: 'uppercase'}}>Password</label>
                                <input className="auth-input" type="password" required />
                                <button className="auth-btn" type="submit">{authMode === 'login' ? 'Login' : 'Continue'}</button>
                            </form>
                            <p onClick={() => setAuthMode(authMode === 'login' ? 'reg' : 'login')} style={{color: '#00aff4', cursor: 'pointer', fontSize: '14px', marginTop: '15px'}}>
                                {authMode === 'login' ? 'Need an account? Register' : 'Already have an account?'}
                            </p>
                        </div>
                    </div>
                );
            }

            // 2. Main App Page
            return (
                <div className="app-container">
                    <div className="sidebar">
                        {data.servers.map(s => (
                            <div 
                                key={s} 
                                className={`server-icon ${currentServer === s ? 'active' : ''}`}
                                onClick={() => setCurrentServer(s)}
                            >
                                {s.substring(0, 2).toUpperCase()}
                            </div>
                        ))}
                        <div className="server-icon add-server" onClick={addNewServer}>+</div>
                    </div>

                    <div className="main-content">
                        <div className="header"># {currentServer}</div>
                        <div className="chat-area">
                            {data.chatHistory[currentServer].map((m, i) => (
                                <div key={i} className="message">
                                    <span className="user">{m.user}</span>
                                    <span className="text">{m.text}</span>
                                </div>
                            ))}
                        </div>
                        <div className="input-container">
                            <input 
                                className="message-input" 
                                value={msgInput}
                                onChange={(e) => setMsgInput(e.target.value)}
                                onKeyDown={sendMessage}
                                placeholder={`Message #${currentServer}`} 
                            />
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
